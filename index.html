<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade 3 - Página de Pagamento</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="cartao-pagamento">
    <h1>Pagamento</h1>

    <!-- Campo Valor -->
    <div class="campo">
      <label for="valor">Valor</label>
      <input type="text" id="valor" placeholder="0,00">
    </div>
    <p id="erro-valor" class="mensagem-erro escondido">O campo valor deve ser preenchido.</p>

    <!-- Opções de pagamento -->
    <div class="opcoes-pagamento">
      <label>
        <input type="radio" name="forma-pagamento" id="opcao-pix" value="pix" checked>
        PIX
      </label>
      <label>
        <input type="radio" name="forma-pagamento" id="opcao-cartao" value="cartao">
        Cartão de Crédito
      </label>
    </div>

    <button id="btn-informar-dados">Informar dados</button>

    <!-- Painel PIX -->
    <div id="painel-pix" class="painel escondido">
      <h2>PIX</h2>
      <div class="campo">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" placeholder="000.000.000-00">
      </div>
      <p class="total">Total: <span id="total-pix">R$ 0,00</span></p>
      <button id="btn-pagar-pix" class="btn-pagar">Pagar</button>
    </div>

    <!-- Painel Cartão de Crédito -->
    <div id="painel-cartao" class="painel escondido">
      <h2>CARTÃO DE CRÉDITO</h2>

      <div class="campo campo-numero">
        <label for="numero-cartao">Número</label>
        <div class="numero-wrapper">
          <input type="text" id="numero-cartao" placeholder="0000 0000 0000 0000">
          <img id="bandeira-cartao" class="bandeira-icone escondido" src="" alt="Bandeira do cartão">
        </div>
      </div>
      <p id="erro-numero" class="mensagem-erro escondido">Número de cartão inválido</p>

      <div class="campo">
        <label for="titular">Titular</label>
        <input type="text" id="titular" placeholder="Nome impresso no cartão">
      </div>

      <div class="campo">
        <label for="cod-seguranca">Cód. Segurança</label>
        <input type="text" id="cod-seguranca" placeholder="000" maxlength="4">
      </div>

      <div class="campo">
        <label for="vencimento">Vencimento</label>
        <input type="text" id="vencimento" placeholder="MM/AA">
      </div>

      <div class="campo">
        <label for="parcelas">Parcelas</label>
        <select id="parcelas">
          <option value="1">1x</option>
          <option value="2">2x</option>
          <option value="3">3x</option>
          <option value="4">4x (5% de juros)</option>
          <option value="5">5x (10% de juros)</option>
        </select>
      </div>

      <div class="lista-parcelas">
        <span>1x <span id="valor-parcela-1">R$ 0,00</span></span>
        <span>2x <span id="valor-parcela-2">R$ 0,00</span></span>
        <span>3x <span id="valor-parcela-3">R$ 0,00</span></span>
        <span>4x <span id="valor-parcela-4">R$ 0,00</span></span>
        <span>5x <span id="valor-parcela-5">R$ 0,00</span></span>
      </div>

      <p class="total">Total: <span id="total-cartao">R$ 0,00</span></p>
      <button id="btn-pagar-cartao" class="btn-pagar">Pagar</button>
    </div>

    <!-- Mensagem de sucesso -->
    <p id="mensagem-sucesso" class="mensagem-sucesso escondido">Pagamento realizado com sucesso!</p>

  </div>

  <script src="script.js"></script>
</body>
</html>
